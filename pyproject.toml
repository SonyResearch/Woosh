[project]
name = "sfxfm"
version = "0.1.0"
description = "Public release of the Sound Effect Foundation model by Sony AI."
readme = "README.md"
requires-python = "==3.13"
license = "MIT"
# license-files = ["LICEN[CS]E*"]
keywords = ["genai", "flow matching", "sound", "sfx"]
dependencies = [
    # "apex>=0.9.10.dev0",
    # "auraloss[all]>=0.4.0",
    "boto3>=1.41.3",
    # "braceexpand>=0.1.7",
    # "datasets>=4.4.1",
    # "deepspeed>=0.18.2",
    "einops>=0.8.1",
    # "fast-pytorch-kmeans>=0.2.2",
    # "ftfy>=6.3.1",
    # "gitpython>=3.1.45", # git_repo_hash is used in wandb init, could maybe be removed?
    # "gradio>=5.50.0",
    # "h5py>=3.15.1",
    # "hf-fastup>=0.0.7",
    # "hf-transfer>=0.1.9",
    # "hydra-colorlog>=1.2.0",
    "hydra-core>=1.3.2",
    # "julius>=0.2.7",
    "lightning>=2.5.6",
    # "minimp3py",
    # "openpyxl>=3.1.5",
    # "pandarallel>=1.6.5",
    # "pipdeptree>=2.30.0",
    # "progressbar>=2.5",
    "pyloudnorm>=0.1.1",  # removeable
    # "pytest>=9.0.1",
    # "rich>=14.2.0",
    # "seaborn>=0.13.2",
    "timm>=1.0.22",
    # "tinytag>=2.1.2",
    "torch==2.8.0",
    "torchaudio==2.8.0",
    # "torchvision==0.23.0",
    "torchdiffeq>=0.2.5",
    # "torchlibrosa>=0.1.0",
    # "torchsde>=0.2.6",
    # "transformer-engine>=2.9.0",
    "transformers>=4.57.2",
    "vector-quantize-pytorch>=1.27.6",  # remove
    # "wandb>=0.23.0",
    # "webdataset>=1.0.2",
    # "websocket-client>=1.9.0",
    # "wget>=3.2",
    "hear21passt==0.0.26",
    # "swig>=4.4.0",
    #
    # needed to add the following!
    "matplotlib>=3.10.7",
    "scikit-learn>=1.8.0",
    "librosa>=0.11.0",
    "pydantic>=2.12.5",
    "omegaconf>=2.3.0",
]

[tool.uv]
extra-build-variables = { minimp3py = { CFLAGS='-O3 -march=native'} }
# to avoid installing dependencies like:
# pip install hear21passt --no-dependencies
dependency-metadata = [
    { name = "hear21passt", version = "0.0.26", requires-dist = []},
]

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchaudio = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
minimp3py = { git = "https://github.com/f0k/minimp3py/" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[dependency-groups]
dev = [
    "ipykernel",
    "ipython",
    "pip-licenses>=5.5.0",
    "ruff>=0.14.6",
]


#[tool.licensecheck]
# license = "mit"               # Specify the project license explicitly
